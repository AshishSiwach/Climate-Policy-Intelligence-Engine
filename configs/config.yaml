# CPIE Configuration
# TBD values are locked after Week 2 notebook validation.
# Do not set defaults here — lock only after comparison.

# --- Chunking ---
chunking:
  default_chunk_size: 400        # tokens — validate in pdf_quality_audit.ipynb
  default_overlap: 80            # tokens
  max_chunk_size: 512            # hard ceiling — reranker degrades above this
  # Document-type-aware strategy:
  # ofgem: numbered paragraph boundaries
  # fca: section headings; footnotes attached to paragraph above
  # desnz: page-based with overlap; headers as metadata
  # ipcc/iea: section-based; executive summary as separate high-priority chunk

# --- Embedding model (LOCKED Week 2) ---
embedding:
  model: BAAI/bge-base-en-v1.5   # LOCKED — beat all-MiniLM-L6-v2 on top-5 relevance and cosine sim distribution
  # all-MiniLM-L6-v2: mean cosine=0.278, index=2.8s, dim=384
  # bge-base-en-v1.5:  mean cosine=0.543, index=21.6s, dim=768 — better separation, acceptable on RTX 4050
  device: cuda                   # RTX 4050 Laptop GPU confirmed available

# --- Chunking (LOCKED Week 2) ---
# chunk_size=400 confirmed: avg=397-400 tokens, max=400, zero chunks over 512 ceiling
# overlap=80 (20%) — principled range for regulatory prose; boundary quality acceptable in retrieval
# table pages: heading injection strategy — prepend nearest section heading to preserve numeric context
# ESO Beyond 2030 / Ofgem: strip nav/header artefacts before chunking (Include with fixes)

# --- Retrieval ---
retrieval:
  bm25:
    k1: 1.5
    b: 0.75
  rrf:
    k: 60   # LOCKED — literature default (Cormack et al. 2009); k=10/30/60 identical on test query (retrievers agreed)
  reranker:
    model: cross-encoder/ms-marco-MiniLM-L-6-v2
    top_k_candidates: 20   # candidates passed to reranker
    top_k_final: 5         # chunks returned to synthesiser
    lazy_load: true

# --- Vector store ---
vector_store:
  provider: chroma
  persist_directory: data/processed/chroma_db
  collection_name: cpie_v1

# --- LLM synthesis (TBD — lock after Week 2 model_selection.ipynb) ---
synthesis:
  model: null  # candidates: claude-haiku-3-5 | gpt-4o-mini
  max_tokens: 1024
  temperature: 0.0
  # Lock after: quality, latency, cost comparison on 10 queries

# --- Output schema ---
output:
  confidence_threshold: 0.5   # below this, flag low confidence in response
  include_contradictions: true

# --- Monitoring / logging ---
monitoring:
  log_dir: logs/
  log_format: jsonl
  dashboard_port: 8502

# --- Streamlit UI ---
ui:
  port: 8501
  title: "CPIE — Climate Policy Intelligence Engine"
